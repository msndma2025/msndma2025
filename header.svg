<svg xmlns="http://www.w3.org/2000/svg" width="800" height="220" viewBox="0 0 800 220" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#1a1a2e"/>
      <stop offset="100%" stop-color="#16213e"/>
    </linearGradient>
    <linearGradient id="shimmer" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b"/>
      <stop offset="50%" stop-color="#feca57"/>
      <stop offset="100%" stop-color="#ff6b6b"/>
      <animateTransform attributeName="gradientTransform" type="translate"
        from="-1 0" to="1 0" dur="3s" repeatCount="indefinite"/>
    </linearGradient>
    <linearGradient id="rainbow" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ff6b6b">
        <animate attributeName="stop-color"
          values="#ff6b6b;#feca57;#48dbfb;#ff9ff3;#ff6b6b" dur="4s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#48dbfb">
        <animate attributeName="stop-color"
          values="#48dbfb;#ff9ff3;#ff6b6b;#feca57;#48dbfb" dur="4s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>
  </defs>

  <rect width="800" height="220" rx="16" fill="url(#bg)"/>

  <!-- floating crown -->
  <text x="400" y="55" font-size="38" text-anchor="middle">
    👑
    <animateTransform attributeName="transform" type="translate"
      values="0 0; 0 -10; 0 0" dur="3s" repeatCount="indefinite"/>
  </text>

  <!-- title with glow pulse -->
  <text x="400" y="115" font-family="Verdana, sans-serif" font-size="34" font-weight="bold"
        text-anchor="middle" fill="url(#shimmer)">
    🔥 Certified Code Disaster 🔥
    <animate attributeName="opacity" values="1;0.7;1" dur="2s" repeatCount="indefinite"/>
  </text>

  <!-- subtitle rainbow -->
  <text x="400" y="160" font-family="Verdana, sans-serif" font-size="18" font-weight="bold"
        text-anchor="middle" fill="url(#rainbow)">
    Built different. Mostly broken, but different.
  </text>

  <!-- animated underline -->
  <rect x="250" y="178" width="300" height="3" rx="2" fill="url(#rainbow)">
    <animate attributeName="width" values="0;300;0" dur="4s" repeatCount="indefinite"/>
    <animate attributeName="x" values="400;250;400" dur="4s" repeatCount="indefinite"/>
  </rect>
</svg>
